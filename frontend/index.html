<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Medical Report Summarizer</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<!-- NAVBAR -->
<div id="navbar" class="navbar hidden">
  <h2 style="font-family: cursive;">AI Health Assistant</h2>

  <div class="profile">
    <button onclick="toggleMenu()">👤</button>
    <div id="menu" class="dropdown hidden">
      <p id="user"></p>
      <button onclick="logout()">Logout</button>
    </div>
  </div>
</div>

<!-- AUTH -->
<div id="auth" class="center">

  <div class="glass-card">

    <h2>Welcome</h2>

    <!-- LOGIN -->
    <div id="loginBox">
      <input id="loginUser" placeholder="Username">
      <input id="loginPass" type="password" placeholder="Password">
      <button onclick="login()">Login</button>

      <p class="switch" onclick="showSignup()" style="color: #3b82f6;">
        Don't have an account? Create one
      </p>
    </div>

    <!-- SIGNUP -->
    <div id="signupBox" class="hidden">
      <input id="signupUser" placeholder="Username">
      <input id="signupPass" type="password" placeholder="Password">
      <button onclick="signup()">Create Account</button>

      <p class="switch" onclick="showLogin()" style="margin-top: 10px; font-size: 12px; color: #3b82f6; cursor: pointer;">
  Already have an account? Login
</p>
    </div>

  </div>
</div>

<!-- DASHBOARD -->
<div id="dashboard" class="hidden">

  <div class="glass-upload">

    <h2 style="color: #3b82f6;">Upload Medical Report</h2>

    <input type="file" id="file">

    <button onclick="upload()">Upload</button>

    <pre id="result" style="color: #3b82f6;">AI summary will appear here...</pre>

  </div>

</div>

<script src="script.js"></script>
</body>
</html>
